<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Centering Cam</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow+Condensed:wght@400;700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{--yellow:#ffcc00;--green:#00ff88;--red:#ff2244;--orange:#ff6600;--cyan:#00cfff;--bg:#0a0a0a;--panel:#111;--border:#222}
body{background:var(--bg);color:#fff;font-family:'Share Tech Mono',monospace;height:100dvh;display:flex;flex-direction:column;overflow:hidden}
header{background:var(--panel);border-bottom:1px solid var(--border);padding:10px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
header h1{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:1.3rem;letter-spacing:.08em;color:var(--yellow);text-transform:uppercase}
#ready-dot{font-size:.6rem;color:var(--green);letter-spacing:.1em}
#cam-wrap{position:relative;flex:1;overflow:hidden;background:#000}
video{width:100%;height:100%;object-fit:cover;display:block}
canvas#overlay{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:2}
canvas#proc{display:none}
#controls{position:absolute;top:10px;right:10px;z-index:10;display:flex;flex-direction:column;gap:8px}
.ctrl-btn{background:rgba(0,0,0,.75);border:1px solid #333;color:#fff;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:.75rem;letter-spacing:.1em;padding:8px 12px;border-radius:3px;cursor:pointer;text-transform:uppercase;white-space:nowrap;-webkit-tap-highlight-color:transparent}
.ctrl-btn.active{border-color:var(--green);color:var(--green)}
#lock-btn{border-color:var(--yellow);color:var(--yellow)}
#lock-btn.locked{border-color:var(--green);color:var(--green)}
#torch-btn.on{border-color:var(--yellow);color:var(--yellow)}
#start-msg{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,0,.92);z-index:20;gap:14px;text-align:center;padding:24px}
#start-msg h2{font-family:'Barlow Condensed',sans-serif;font-size:1.8rem;font-weight:900;color:var(--yellow)}
#start-msg p{font-size:.75rem;color:#888;max-width:260px;line-height:1.7}
#start-btn{background:var(--yellow);color:#000;border:none;padding:14px 32px;font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:1.1rem;letter-spacing:.1em;text-transform:uppercase;border-radius:3px;cursor:pointer;margin-top:4px}
#tip{font-size:.65rem;color:#444;margin-top:-4px}
#status-bar{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);font-size:.62rem;color:#aaa;background:rgba(0,0,0,.65);padding:4px 12px;border-radius:20px;z-index:5;pointer-events:none;letter-spacing:.08em;white-space:nowrap}
#flash-overlay{position:absolute;inset:0;background:#fff;opacity:0;pointer-events:none;z-index:15;transition:opacity .2s ease-out}
#stats{background:var(--panel);border-top:1px solid var(--border);padding:12px 16px;display:grid;grid-template-columns:1fr 1fr;gap:10px;flex-shrink:0}
.stat-block{background:#0d0d0d;border:1px solid var(--border);border-radius:4px;padding:8px 10px}
.stat-label{font-size:.6rem;color:#555;letter-spacing:.15em;text-transform:uppercase;margin-bottom:4px}
.stat-row{display:flex;justify-content:space-between;align-items:baseline}
.stat-value{font-size:1.2rem;font-weight:bold;font-family:'Barlow Condensed',sans-serif}
.stat-ratio{font-size:.75rem;color:#888}
.bar-wrap{background:#1a1a1a;border-radius:2px;height:4px;margin-top:5px;overflow:hidden}
.bar-fill{height:100%;border-radius:2px;transition:width .15s ease}
.grade-block{grid-column:1/-1;background:#0d0d0d;border:2px solid var(--border);border-radius:4px;padding:8px 14px;display:flex;justify-content:space-between;align-items:center;transition:border-color .3s ease}
.grade-label{font-size:.6rem;color:#555;letter-spacing:.15em;text-transform:uppercase}
.grade-value{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:2rem;letter-spacing:.05em}
.grade-desc{font-size:.7rem;text-align:right;color:#888}
.stability-tag{font-size:.55rem;letter-spacing:.12em;margin-top:2px;text-transform:uppercase}
</style>
</head>
<body>

<header>
  <h1>&#x2B1B; Centering Cam</h1>
  <span id="ready-dot">&#x25CF; READY</span>
</header>

<div id="cam-wrap">
  <video id="video" autoplay playsinline muted></video>
  <canvas id="overlay"></canvas>
  <canvas id="proc"></canvas>
  <div id="flash-overlay"></div>

  <div id="controls">
    <button class="ctrl-btn active" id="auto-btn">&#x27F3; AUTO</button>
    <button class="ctrl-btn" id="lock-btn">&#x2B1B; LOCK</button>
    <button class="ctrl-btn" id="flip-btn">&#x1F504; FLIP</button>
    <button class="ctrl-btn" id="torch-btn" style="display:none">&#x1F526; LIGHT</button>
    <button class="ctrl-btn" id="snap-btn">&#x1F4F7; SNAP</button>
  </div>

  <div id="status-bar">Searching &mdash; place card on dark surface</div>

  <div id="start-msg">
    <h2>Centering Cam</h2>
    <p>Point your camera at a Pok&eacute;mon card on a dark surface. Edges are detected automatically.</p>
    <button id="start-btn">Start Camera</button>
    <div id="tip">Best results on a black or dark background</div>
  </div>
</div>

<div id="stats">
  <div class="stat-block">
    <div class="stat-label">&#x25C0; Left / Right &#x25B6;</div>
    <div class="stat-row">
      <span class="stat-value" id="lr-val" style="color:var(--orange)">&mdash;</span>
      <span class="stat-ratio" id="lr-ratio">&mdash;</span>
    </div>
    <div class="bar-wrap"><div class="bar-fill" id="lr-bar" style="background:var(--orange);width:50%"></div></div>
  </div>
  <div class="stat-block">
    <div class="stat-label">&#x25B2; Top / Bottom &#x25BC;</div>
    <div class="stat-row">
      <span class="stat-value" id="tb-val" style="color:var(--cyan)">&mdash;</span>
      <span class="stat-ratio" id="tb-ratio">&mdash;</span>
    </div>
    <div class="bar-wrap"><div class="bar-fill" id="tb-bar" style="background:var(--cyan);width:50%"></div></div>
  </div>
  <div class="grade-block" id="grade-block">
    <div>
      <div class="grade-label">Est. PSA Grade</div>
      <div class="grade-value" id="grade-val">&mdash;</div>
      <div class="stability-tag" id="stability-tag">&nbsp;</div>
    </div>
    <div class="grade-desc" id="grade-desc">Point camera<br>at card</div>
  </div>
</div>

<script>
// ============================================================
// DETECTION WEB WORKER (inlined as Blob)
// ============================================================
const workerCode = `
self.onmessage = function(e) {
  const { data: pixels, width: PW, height: PH } = e.data;

  // Grayscale
  const gray = new Uint8Array(PW * PH);
  for (let i = 0; i < PW * PH; i++) {
    gray[i] = (pixels[i*4]*77 + pixels[i*4+1]*150 + pixels[i*4+2]*29) >> 8;
  }

  // Otsu's threshold
  const hist = new Int32Array(256);
  for (let i = 0; i < gray.length; i++) hist[gray[i]]++;

  const total = gray.length;
  let sumAll = 0;
  for (let i = 0; i < 256; i++) sumAll += i * hist[i];

  let sumB = 0, wB = 0, maxVar = 0, threshold = 0;
  for (let t = 0; t < 256; t++) {
    wB += hist[t];
    if (wB === 0) continue;
    const wF = total - wB;
    if (wF === 0) break;
    sumB += t * hist[t];
    const mB = sumB / wB;
    const mF = (sumAll - sumB) / wF;
    const between = wB * wF * (mB - mF) * (mB - mF);
    if (between > maxVar) { maxVar = between; threshold = t; }
  }

  // Projection analysis
  const rowBright = new Float32Array(PH);
  const colBright = new Float32Array(PW);
  for (let y = 0; y < PH; y++) {
    let cnt = 0;
    for (let x = 0; x < PW; x++) {
      if (gray[y * PW + x] > threshold) cnt++;
    }
    rowBright[y] = cnt / PW;
  }
  for (let x = 0; x < PW; x++) {
    let cnt = 0;
    for (let y = 0; y < PH; y++) {
      if (gray[y * PW + x] > threshold) cnt++;
    }
    colBright[x] = cnt / PH;
  }

  const ROW_T = 0.25, COL_T = 0.25;
  let top = -1, bot = -1, left = -1, right = -1;
  for (let y = 0; y < PH; y++) {
    if (rowBright[y] > ROW_T) { if (top < 0) top = y; bot = y; }
  }
  for (let x = 0; x < PW; x++) {
    if (colBright[x] > COL_T) { if (left < 0) left = x; right = x; }
  }

  if (top < 0 || bot < 0 || left < 0 || right < 0) {
    self.postMessage({ found: false });
    return;
  }

  const cw = right - left;
  const ch = bot - top;
  if (cw < PW * 0.1 || ch < PH * 0.1) { self.postMessage({ found: false }); return; }

  const ar = cw / ch;
  if (ar < 0.45 || ar > 1.1) { self.postMessage({ found: false }); return; }

  self.postMessage({
    found: true,
    left: left / PW,
    top: top / PH,
    width: cw / PW,
    height: ch / PH,
    ar: ar,
    threshold: threshold
  });
};
`;

const workerBlob = new Blob([workerCode], { type: 'application/javascript' });
const worker = new Worker(URL.createObjectURL(workerBlob));
let workerBusy = false;

// ============================================================
// DOM REFS
// ============================================================
const video = document.getElementById('video');
const overlay = document.getElementById('overlay');
const proc = document.getElementById('proc');
const ctx = overlay.getContext('2d');
const pctx = proc.getContext('2d', { willReadFrequently: true });
const wrap = document.getElementById('cam-wrap');
const statusBar = document.getElementById('status-bar');
const flashEl = document.getElementById('flash-overlay');

// ============================================================
// STATE
// ============================================================
let locked = false, lockedCard = null, smoothCard = null, lastDetect = 0;
let facingMode = 'environment';
let currentStream = null;
let torchOn = false;
let hadCard = false; // for haptic on first detect
const SMOOTH = 0.15;
const PW = 160, PH = 120;
proc.width = PW; proc.height = PH;

// Stability ring buffer
const STABILITY_SIZE = 12;
const stabilityBuf = [];
let stabilityState = 'MOVING';

function lerp(a, b, t) { return a + (b - a) * t; }

function vibrate(pattern) {
  if (navigator.vibrate) navigator.vibrate(pattern);
}

// ============================================================
// CAMERA
// ============================================================
async function startCamera() {
  if (currentStream) {
    currentStream.getTracks().forEach(t => t.stop());
  }
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: facingMode }, width: { ideal: 1920 } }
    });
    currentStream = stream;
    video.srcObject = stream;
    document.getElementById('start-msg').style.display = 'none';
    resizeCanvas();

    // Check torch capability
    const track = stream.getVideoTracks()[0];
    const caps = track.getCapabilities ? track.getCapabilities() : {};
    const torchBtn = document.getElementById('torch-btn');
    if (caps.torch) {
      torchBtn.style.display = '';
    } else {
      torchBtn.style.display = 'none';
      torchOn = false;
    }

    requestAnimationFrame(loop);
  } catch (e) {
    document.getElementById('start-msg').innerHTML =
      `<h2 style="color:var(--red)">Camera Error</h2>
       <p>${e.message}</p>
       <p style="margin-top:10px;color:#555;font-size:.65rem">Open this page directly in your browser, not inside another app.</p>`;
  }
}

document.getElementById('start-btn').addEventListener('click', startCamera);

// ============================================================
// CONTROLS
// ============================================================

// Auto
document.getElementById('auto-btn').addEventListener('click', () => {
  locked = false;
  lockedCard = null;
  document.getElementById('auto-btn').classList.add('active');
  document.getElementById('lock-btn').classList.remove('locked');
  document.getElementById('lock-btn').textContent = '\u2B1B LOCK';
});

// Lock
function toggleLock() {
  if (locked) {
    // Unlock
    locked = false;
    lockedCard = null;
    document.getElementById('auto-btn').classList.add('active');
    document.getElementById('lock-btn').classList.remove('locked');
    document.getElementById('lock-btn').textContent = '\u2B1B LOCK';
  } else if (smoothCard) {
    // Lock
    locked = true;
    lockedCard = { ...smoothCard };
    document.getElementById('lock-btn').classList.add('locked');
    document.getElementById('lock-btn').textContent = '\u2713 LOCKED';
    document.getElementById('auto-btn').classList.remove('active');
    vibrate([30, 20, 30]);
  }
}

document.getElementById('lock-btn').addEventListener('click', toggleLock);

// Tap to lock/unlock on video area
wrap.addEventListener('click', (e) => {
  // Don't trigger on buttons or start message
  if (e.target.closest('#controls') || e.target.closest('#start-msg')) return;
  toggleLock();
});

// Flip camera
document.getElementById('flip-btn').addEventListener('click', async () => {
  facingMode = facingMode === 'environment' ? 'user' : 'environment';
  torchOn = false;
  document.getElementById('torch-btn').classList.remove('on');
  await startCamera();
});

// Torch
document.getElementById('torch-btn').addEventListener('click', async () => {
  if (!currentStream) return;
  const track = currentStream.getVideoTracks()[0];
  torchOn = !torchOn;
  try {
    await track.applyConstraints({ advanced: [{ torch: torchOn }] });
    document.getElementById('torch-btn').classList.toggle('on', torchOn);
  } catch (e) {
    torchOn = false;
  }
});

// Snapshot
document.getElementById('snap-btn').addEventListener('click', () => {
  if (video.readyState < 4) return;

  // Flash effect
  flashEl.style.transition = 'none';
  flashEl.style.opacity = '0.8';
  requestAnimationFrame(() => {
    flashEl.style.transition = 'opacity 0.3s ease-out';
    flashEl.style.opacity = '0';
  });

  // Composite canvas
  const cw = overlay.width;
  const ch = overlay.height;
  const barH = 48;
  const snapCanvas = document.createElement('canvas');
  snapCanvas.width = cw;
  snapCanvas.height = ch + barH;
  const sctx = snapCanvas.getContext('2d');

  // Draw video
  sctx.drawImage(video, 0, 0, cw, ch);
  // Draw overlay
  sctx.drawImage(overlay, 0, 0, cw, ch);

  // Stats watermark bar
  sctx.fillStyle = 'rgba(0,0,0,0.85)';
  sctx.fillRect(0, ch, cw, barH);

  const card = locked ? lockedCard : smoothCard;
  if (card) {
    const W = overlay.width, H = overlay.height;
    const lB = Math.round(card.x);
    const rB = Math.round(W - (card.x + card.w));
    const tB = Math.round(card.y);
    const bB = Math.round(H - (card.y + card.h));

    sctx.font = '700 13px "Barlow Condensed", sans-serif';
    sctx.fillStyle = '#ff6600';
    sctx.fillText(`L:${lB}px  R:${rB}px`, 12, ch + 20);
    sctx.fillStyle = '#00cfff';
    sctx.fillText(`T:${tB}px  B:${bB}px`, 12, ch + 38);

    const gradeEl = document.getElementById('grade-val');
    sctx.fillStyle = gradeEl.style.color || '#fff';
    sctx.font = '900 24px "Barlow Condensed", sans-serif';
    sctx.textAlign = 'right';
    sctx.fillText(`PSA ${gradeEl.textContent}`, cw - 12, ch + 32);
    sctx.textAlign = 'left';

    sctx.fillStyle = '#555';
    sctx.font = '10px "Share Tech Mono", monospace';
    sctx.fillText(`${stabilityState}`, cw / 2 - 20, ch + 30);
  }

  sctx.fillStyle = '#333';
  sctx.font = '9px "Share Tech Mono", monospace';
  sctx.textAlign = 'center';
  sctx.fillText('Centering Cam', cw / 2, ch + barH - 4);

  // Download
  const link = document.createElement('a');
  link.download = `centering-${Date.now()}.png`;
  link.href = snapCanvas.toDataURL('image/png');
  link.click();
});

// ============================================================
// CANVAS RESIZE
// ============================================================
function resizeCanvas() {
  overlay.width = wrap.clientWidth;
  overlay.height = wrap.clientHeight;
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

// ============================================================
// WORKER COMMUNICATION
// ============================================================
worker.onmessage = function(e) {
  workerBusy = false;
  const d = e.data;
  if (!d.found) {
    if (Date.now() - lastDetect > 1200) {
      smoothCard = null;
      hadCard = false;
      statusBar.textContent = 'Searching \u2014 place card on dark surface';
      stabilityBuf.length = 0;
      stabilityState = 'MOVING';
    }
    return;
  }

  const W = overlay.width, H = overlay.height;
  const n = { x: d.left * W, y: d.top * H, w: d.width * W, h: d.height * H };

  if (!smoothCard) {
    smoothCard = { ...n };
    if (!hadCard) {
      hadCard = true;
      vibrate(50);
    }
  } else {
    smoothCard.x = lerp(smoothCard.x, n.x, SMOOTH);
    smoothCard.y = lerp(smoothCard.y, n.y, SMOOTH);
    smoothCard.w = lerp(smoothCard.w, n.w, SMOOTH);
    smoothCard.h = lerp(smoothCard.h, n.h, SMOOTH);
  }

  lastDetect = Date.now();
  statusBar.textContent = `Card detected \u00B7 AR ${d.ar.toFixed(2)} \u00B7 T:${d.threshold} \u00B7 ${stabilityState}`;

  // Stability tracking
  const cx = smoothCard.x + smoothCard.w / 2;
  const cy = smoothCard.y + smoothCard.h / 2;
  stabilityBuf.push({ cx, cy });
  if (stabilityBuf.length > STABILITY_SIZE) stabilityBuf.shift();
  updateStability();
};

function sendFrameToWorker() {
  if (workerBusy || video.readyState < 4) return;
  try {
    pctx.drawImage(video, 0, 0, PW, PH);
  } catch (e) { return; }
  const imgData = pctx.getImageData(0, 0, PW, PH);
  workerBusy = true;
  worker.postMessage({ data: imgData.data, width: PW, height: PH });
}

// ============================================================
// STABILITY
// ============================================================
function updateStability() {
  if (stabilityBuf.length < 3) { stabilityState = 'MOVING'; return; }
  const n = stabilityBuf.length;
  let sumCx = 0, sumCy = 0;
  for (const p of stabilityBuf) { sumCx += p.cx; sumCy += p.cy; }
  const meanCx = sumCx / n, meanCy = sumCy / n;
  let variance = 0;
  for (const p of stabilityBuf) {
    variance += (p.cx - meanCx) ** 2 + (p.cy - meanCy) ** 2;
  }
  variance = Math.sqrt(variance / n);

  if (variance > 15) stabilityState = 'MOVING';
  else if (variance > 8) stabilityState = 'ADJUSTING';
  else if (variance > 3) stabilityState = 'SETTLING';
  else stabilityState = 'STABLE';
}

// ============================================================
// MAIN LOOP
// ============================================================
function loop() {
  requestAnimationFrame(loop);
  if (!locked) sendFrameToWorker();
  const card = locked ? lockedCard : smoothCard;
  drawOverlay(card);
  if (card) updateStats(card);
}

// ============================================================
// DRAW OVERLAY
// ============================================================
function drawOverlay(card) {
  const W = overlay.width, H = overlay.height;
  ctx.clearRect(0, 0, W, H);

  if (!card) {
    // Scanning animation
    const scanY = ((Date.now() / 1500) % 1) * H;
    ctx.strokeStyle = 'rgba(255,204,0,0.1)';
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(0, scanY); ctx.lineTo(W, scanY); ctx.stroke();
    // Guide box
    ctx.strokeStyle = 'rgba(255,204,0,0.18)';
    ctx.setLineDash([6, 6]);
    ctx.lineWidth = 1.5;
    ctx.strokeRect(W * 0.08, H * 0.04, W * 0.84, H * 0.88);
    ctx.setLineDash([]);
    ctx.fillStyle = 'rgba(255,204,0,0.5)';
    ctx.font = '11px "Share Tech Mono"';
    ctx.textAlign = 'center';
    ctx.fillText('Position card in frame', W / 2, H / 2);
    return;
  }

  const { x, y, w: cw, h: ch } = card;

  // Dim outside
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillRect(0, 0, W, y);
  ctx.fillRect(0, y + ch, W, H - (y + ch));
  ctx.fillRect(0, y, x, ch);
  ctx.fillRect(x + cw, y, W - (x + cw), ch);

  // Grade colour
  const worst = getWorstRatio(card);
  const bc = worst <= 1.22 ? '#00ff88' : worst <= 1.5 ? '#aaff00' : worst <= 1.86 ? '#ffcc00' : worst <= 2.33 ? '#ff8800' : '#ff2244';

  // Glow border
  ctx.strokeStyle = bc;
  ctx.lineWidth = 2.5;
  ctx.shadowColor = bc;
  ctx.shadowBlur = 12;
  ctx.strokeRect(x, y, cw, ch);
  ctx.shadowBlur = 0;

  // Corner brackets
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 3;
  [[x, y, 1, 1], [x + cw, y, -1, 1], [x, y + ch, 1, -1], [x + cw, y + ch, -1, -1]].forEach(([px, py, dx, dy]) => {
    ctx.beginPath(); ctx.moveTo(px, py); ctx.lineTo(px + dx * 22, py); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(px, py); ctx.lineTo(px, py + dy * 22); ctx.stroke();
  });

  // Crosshair
  ctx.strokeStyle = 'rgba(255,255,255,0.18)';
  ctx.setLineDash([4, 5]);
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(x + cw / 2, y); ctx.lineTo(x + cw / 2, y + ch); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x, y + ch / 2); ctx.lineTo(x + cw, y + ch / 2); ctx.stroke();
  ctx.setLineDash([]);

  // Edge lines
  ctx.lineWidth = 1.5;
  ctx.shadowBlur = 5;
  ctx.strokeStyle = '#00cfff'; ctx.shadowColor = '#00cfff';
  ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(0, y + ch); ctx.lineTo(W, y + ch); ctx.stroke();
  ctx.strokeStyle = '#ff6600'; ctx.shadowColor = '#ff6600';
  ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x + cw, 0); ctx.lineTo(x + cw, H); ctx.stroke();
  ctx.shadowBlur = 0;

  // Frame center reference
  ctx.strokeStyle = 'rgba(255,255,255,0.07)';
  ctx.setLineDash([3, 8]); ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(W / 2, 0); ctx.lineTo(W / 2, H); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(0, H / 2); ctx.lineTo(W, H / 2); ctx.stroke();
  ctx.setLineDash([]);

  // --- BORDER PIXEL LABELS ---
  const lB = Math.round(x);
  const rB = Math.round(W - (x + cw));
  const tB = Math.round(y);
  const bB = Math.round(H - (y + ch));

  ctx.font = '700 11px "Barlow Condensed", sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  // Label background helper
  function drawLabel(text, lx, ly, color) {
    const m = ctx.measureText(text);
    const pw = m.width + 8, ph = 14;
    ctx.fillStyle = 'rgba(0,0,0,0.7)';
    ctx.fillRect(lx - pw / 2, ly - ph / 2, pw, ph);
    ctx.fillStyle = color;
    ctx.fillText(text, lx, ly);
  }

  // Left
  drawLabel(`${lB}px`, x / 2, y + ch / 2, '#ff6600');
  // Right
  drawLabel(`${rB}px`, x + cw + (W - x - cw) / 2, y + ch / 2, '#ff6600');
  // Top
  drawLabel(`${tB}px`, x + cw / 2, y / 2, '#00cfff');
  // Bottom
  drawLabel(`${bB}px`, x + cw / 2, y + ch + (H - y - ch) / 2, '#00cfff');

  ctx.textBaseline = 'alphabetic';
}

// ============================================================
// STATS
// ============================================================
function getWorstRatio(card) {
  const { x, y, w: cw, h: ch } = card, W = overlay.width, H = overlay.height;
  const lB = x, rB = W - (x + cw), tB = y, bB = H - (y + ch);
  const lr = Math.min(lB, rB) > 2 ? Math.max(lB, rB) / Math.min(lB, rB) : 99;
  const tb = Math.min(tB, bB) > 2 ? Math.max(tB, bB) / Math.min(tB, bB) : 99;
  return Math.max(lr, tb);
}

function updateStats(card) {
  const { x, y, w: cw, h: ch } = card, W = overlay.width, H = overlay.height;
  const lB = x, rB = W - (x + cw), tB = y, bB = H - (y + ch);
  const lrR = Math.min(lB, rB) > 2 ? Math.max(lB, rB) / Math.min(lB, rB) : 99;
  const tbR = Math.min(tB, bB) > 2 ? Math.max(tB, bB) / Math.min(tB, bB) : 99;

  function pct(a, b) {
    const t = a + b;
    return t ? `${Math.round(a / t * 100)}/${Math.round(b / t * 100)}` : '\u2014';
  }

  document.getElementById('lr-val').textContent = pct(lB, rB);
  document.getElementById('tb-val').textContent = pct(tB, bB);
  document.getElementById('lr-ratio').textContent = lrR.toFixed(2) + ':1';
  document.getElementById('tb-ratio').textContent = tbR.toFixed(2) + ':1';
  document.getElementById('lr-bar').style.width = ((x + cw / 2) / W * 100) + '%';
  document.getElementById('tb-bar').style.width = ((y + ch / 2) / H * 100) + '%';

  const worst = Math.max(lrR, tbR);
  let grade, color, desc;
  if (worst <= 1.22) { grade = '10'; color = '#00ff88'; desc = 'PSA 10 territory'; }
  else if (worst <= 1.50) { grade = '9'; color = '#aaff00'; desc = 'Strong PSA 9'; }
  else if (worst <= 1.86) { grade = '8'; color = '#ffcc00'; desc = 'Likely PSA 8'; }
  else if (worst <= 2.33) { grade = '7'; color = '#ff8800'; desc = 'PSA 7 range'; }
  else { grade = '6\u2193'; color = '#ff2244'; desc = 'Off-center'; }

  const g = document.getElementById('grade-val');
  g.textContent = grade;
  g.style.color = color;
  document.getElementById('grade-desc').textContent = desc;

  // Grade block border color
  document.getElementById('grade-block').style.borderColor = color;

  // Stability tag
  const stag = document.getElementById('stability-tag');
  const scolors = { MOVING: '#ff2244', ADJUSTING: '#ff8800', SETTLING: '#ffcc00', STABLE: '#00ff88' };
  stag.textContent = stabilityState;
  stag.style.color = scolors[stabilityState] || '#555';
}
</script>
